<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления - Кафедра</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <div class="header-left">
                <h1>🏫 Кафедра</h1>
                <span id="userInfo" class="user-info"></span>
            </div>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </header>
        
        <div class="tabs">
            <button class="tab active" data-tab="teachers">👨‍🏫 Преподаватели</button>
            <button class="tab" data-tab="load">📊 Нагрузка</button>
        </div>
        
        <div class="content">
            <div id="teachersTab" class="tab-content active">
                <h2>Список преподавателей</h2>
                <div id="teachersList" class="table-container">
                    <div class="loading-spinner">Загрузка...</div>
                </div>
            </div>
            
            <div id="loadTab" class="tab-content">
                <h2>Нагрузка преподавателей</h2>
                <div id="loadList" class="table-container">
                    <div class="loading-spinner">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/dashboard.js"></script>
</body>
</html>
